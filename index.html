<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 별자리 운세 ✨</title>
    <!-- 폰트 적용: 구글 웹폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <header>
            <h1>Cosmic Destiny</h1>
            <p>생년월일을 입력하고 당신의 우주적인 운세를 확인하세요.</p>
        </header>

        <section class="input-section">
            <form id="horoscope-form">
                <div class="input-group">
                    <label>생년월일 (Birth Date)</label>
                    <div class="date-selects">
                        <select id="birth-year" required aria-label="출생 연도">
                            <option value="" disabled selected>년도</option>
                        </select>
                        <select id="birth-month" required aria-label="출생 월">
                            <option value="" disabled selected>월</option>
                        </select>
                        <select id="birth-day" required aria-label="출생 일">
                            <option value="" disabled selected>일</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-glow">운세 보기</button>
            </form>
        </section>

        <section id="result-section" class="result-section hidden">
            <div class="zodiac-card">
                <div class="zodiac-icon" id="zodiac-icon">♈</div>
                <h2 id="zodiac-name">양자리</h2>
                <p class="date-range" id="zodiac-dates">3.21 - 4.19</p>

                <div class="horoscope-content">
                    <div class="fortune-item">
                        <h3>🌟 종합운</h3>
                        <p id="fortune-general"></p>
                    </div>
                    <div class="fortune-item">
                        <h3>💖 애정운</h3>
                        <p id="fortune-love"></p>
                    </div>
                    <div class="fortune-item">
                        <h3>💰 금전운</h3>
                        <p id="fortune-money"></p>
                    </div>
                    <div class="fortune-item">
                        <h3>💪 건강운</h3>
                        <p id="fortune-health"></p>
                    </div>
                    <div class="fortune-item lucky-box">
                        <span id="lucky-number"></span>
                        <span id="lucky-color"></span>
                    </div>
                </div>

                <button id="reset-btn" class="btn-glow outline">다시 보기</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
